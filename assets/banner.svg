<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Animated Gradient for Title -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5A0">
        <animate attributeName="stop-color"
                 values="#00F5A0;#00D9F5;#A100FF;#00F5A0"
                 dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00D9F5">
        <animate attributeName="stop-color"
                 values="#00D9F5;#A100FF;#00F5A0;#00D9F5"
                 dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Gradient for Subtitle -->
    <linearGradient id="subtitleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="50%" stop-color="#FFD500"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
  </defs>

  <!-- Animated Title (Word-by-Word Loop) -->
  <text x="50%" y="130"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="72"
        font-weight="800"
        fill="url(#titleGradient)">

    <tspan opacity="0">
      Quantized
      <animate attributeName="opacity" values="0;1;1;0"
               dur="8s" repeatCount="indefinite"/>
    </tspan>

    <tspan dx="20" opacity="0">
      CNN
      <animate attributeName="opacity" values="0;0;1;1;0"
               dur="8s" repeatCount="indefinite"/>
    </tspan>

    <tspan dx="20" opacity="0">
      Accelerator
      <animate attributeName="opacity" values="0;0;0;1;1;0"
               dur="8s" repeatCount="indefinite"/>
    </tspan>

    <tspan dx="20" opacity="0">
      IP
      <animate attributeName="opacity" values="0;0;0;0;1;1;0"
               dur="8s" repeatCount="indefinite"/>
    </tspan>

  </text>

  <!-- Moving Subtitle -->
  <g>
    <text y="220"
          font-family="Segoe UI, Arial"
          font-size="30"
          font-weight="600"
          fill="url(#subtitleGradient)">

      <animateTransform
        attributeName="transform"
        type="translate"
        from="1400 0"
        to="-1400 0"
        dur="14s"
        repeatCount="indefinite" />

      Open-Source FPGA Core • 128×128 INT8 Convolution • Vendor-Agnostic • High-Performance Edge AI •

    </text>
  </g>

</svg>
